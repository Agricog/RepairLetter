name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./workers
        run: npm install

      - name: Deploy and set secrets
        working-directory: ./workers
        run: |
          npx wrangler deploy
          echo "${{ secrets.DATABASE_URL }}" | npx wrangler secret put DATABASE_URL
          echo "${{ secrets.DB_ENCRYPTION_KEY }}" | npx wrangler secret put DB_ENCRYPTION_KEY
          echo "${{ secrets.CLERK_SECRET_KEY }}" | npx wrangler secret put CLERK_SECRET_KEY
          echo "${{ secrets.STRIPE_SECRET_KEY }}" | npx wrangler secret put STRIPE_SECRET_KEY
          echo "${{ secrets.STRIPE_WEBHOOK_SECRET }}" | npx wrangler secret put STRIPE_WEBHOOK_SECRET
          echo "${{ secrets.RESEND_API_KEY }}" | npx wrangler secret put RESEND_API_KEY
          echo "${{ secrets.SPEECHMATICS_API_KEY }}" | npx wrangler secret put SPEECHMATICS_API_KEY
          echo "${{ secrets.ANTHROPIC_API_KEY }}" | npx wrangler secret put ANTHROPIC_API_KEY
          echo "${{ secrets.UPSTASH_REDIS_URL }}" | npx wrangler secret put UPSTASH_REDIS_URL
          echo "${{ secrets.UPSTASH_REDIS_TOKEN }}" | npx wrangler secret put UPSTASH_REDIS_TOKEN
